<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carbo HUB</title>
    <meta name="description" content="Um hub único para operar, vender e escalar — Grupo Carbo" />
    <meta name="author" content="Grupo Carbo" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- PWA: instalável na tela inicial (Carbo HUB) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b0f10" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Carbo Hub" />

    <meta property="og:title" content="Carbo HUB" />
    <meta property="og:description" content="Um hub único para operar, vender e escalar — Grupo Carbo" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GrupoCarbo" />
    <meta name="twitter:image" content="/favicon.png" />
    <meta name="build" content="20260406c" />

    <!-- Captura de erros: em vez de tela branca, mostra o erro na tela.
         Escrito em ES5 puro para rodar mesmo em navegadores muito antigos. -->
    <script>
      (function () {
        function show(title, detail) {
          try {
            var el = document.getElementById("carbo-fatal");
            if (!el) {
              el = document.createElement("div");
              el.id = "carbo-fatal";
              el.style.cssText =
                "position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;" +
                "background:#0b0b0c;color:#f5f5f5;font-family:monospace;" +
                "padding:20px;overflow:auto;font-size:14px;line-height:1.5";
              if (document.body) document.body.appendChild(el);
              else
                document.addEventListener("DOMContentLoaded", function () {
                  document.body.appendChild(el);
                });
            }
            el.innerHTML =
              '<div style="color:#ff6b6b;font-size:18px;margin-bottom:12px">' +
              "Erro ao carregar o Carbo HUB</div>" +
              '<div style="color:#ffd166;margin-bottom:8px">' +
              String(title) +
              "</div>" +
              '<pre style="white-space:pre-wrap;word-break:break-word">' +
              String(detail || "") +
              "</pre>" +
              '<div style="margin-top:16px;color:#888">User-Agent:<br>' +
              String(navigator.userAgent) +
              "</div>";
          } catch (e) {}
        }
        window.addEventListener("error", function (ev) {
          var d = ev && ev.error && ev.error.stack ? ev.error.stack : ev && ev.message;
          show(ev && ev.message ? ev.message : "Erro de script", d);
        });
        window.addEventListener("unhandledrejection", function (ev) {
          var r = ev && ev.reason;
          show("Promise rejeitada", r && r.stack ? r.stack : String(r));
        });
        // Se o app não montar nada em 12s, avisa (provável incompatibilidade).
        setTimeout(function () {
          var root = document.getElementById("root");
          if (root && root.children.length === 0) {
            show(
              "O aplicativo não iniciou (tela em branco)",
              "Nenhum erro foi capturado, mas a tela continua vazia. " +
                "Isso costuma indicar um navegador incompatível. " +
                "Tente abrir por outro navegador (ex.: Kiwi ou Firefox)."
            );
          }
        }, 12000);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
